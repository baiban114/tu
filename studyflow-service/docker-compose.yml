services:
  studyflow-postgres:
    image: postgres:16-alpine
    container_name: studyflow-postgres
    environment:
      POSTGRES_DB: studyflow
      POSTGRES_USER: studyflow
      POSTGRES_PASSWORD: studyflow123
    ports:
      - "15433:5432"
    volumes:
      - studyflow_pg_data:/var/lib/postgresql/data

volumes:
  studyflow_pg_data:
